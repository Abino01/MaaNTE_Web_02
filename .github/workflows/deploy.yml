name: Deploy to GitHub Pages

on:
  repository_dispatch:
    types: [md_changes]
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout MaaNTE repository
        uses: actions/checkout@v4
        with:
          repository: 1bananachicken/MaaNTE
          path: MaaNTE-temp

      - name: Sync docs from MaaNTE
        run: |
          cp MaaNTE-temp/docs/README.md docs/README.md || true
          # Preserve site-specific README.md files before sync
          mkdir -p /tmp/docs-backup
          cp docs/zh_cn/README.md /tmp/docs-backup/ 2>/dev/null || true
          cp docs/zh_cn/introduction/README.md /tmp/docs-backup/intro-readme.md 2>/dev/null || true
          cp docs/zh_cn/develop/README.md /tmp/docs-backup/dev-readme.md 2>/dev/null || true
          rsync -av --delete MaaNTE-temp/docs/zh_cn/ docs/zh_cn/ || true
          # Restore site-specific README.md files
          cp /tmp/docs-backup/README.md docs/zh_cn/README.md 2>/dev/null || true
          mkdir -p docs/zh_cn/introduction docs/zh_cn/develop
          cp /tmp/docs-backup/intro-readme.md docs/zh_cn/introduction/README.md 2>/dev/null || true
          cp /tmp/docs-backup/dev-readme.md docs/zh_cn/develop/README.md 2>/dev/null || true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with VuePress
        run: pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
